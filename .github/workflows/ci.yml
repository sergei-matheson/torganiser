name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.3

      - uses: ruby/setup-ruby@v1.312.0
        with:
          ruby-version: "3.3"
          bundler: "4"
          bundler-cache: true

      - run: bundle exec rspec
